name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: "API — lint · type-check · tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: idms_test
          POSTGRES_USER: idms_app
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U idms_app -d idms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://idms_app:testpassword@localhost:5432/idms_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-chars-here

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app/

      - name: Security scan (bandit)
        run: uv run bandit -r app/ -c pyproject.toml

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short

      - name: Security / tenant-isolation tests
        run: uv run pytest tests/security/ -v --tb=short

  web:
    name: "Web — lint · type-check"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check
